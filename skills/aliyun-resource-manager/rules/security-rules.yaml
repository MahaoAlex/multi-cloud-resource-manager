# Security Rules for Aliyun Resource Manager
# Define rules for detecting security issues

rules:
  - id: sg-ssh-open-internet
    name: SSH Port Open to Internet
    resource: security_group
    condition: 'ports contains [22] and source = 0.0.0.0/0'
    severity: critical
    description: Security group allows SSH (port 22) access from any IP address

  - id: sg-ftp-open-internet
    name: FTP Ports Open to Internet
    resource: security_group
    condition: 'ports contains [21] and source = 0.0.0.0/0'
    severity: high
    description: Security group allows FTP access from any IP address

  - id: sg-rdp-open-internet
    name: RDP Port Open to Internet
    resource: security_group
    condition: 'ports contains [3389] and source = 0.0.0.0/0'
    severity: critical
    description: Security group allows RDP access from any IP address

  - id: sg-mysql-open-internet
    name: MySQL Port Open to Internet
    resource: security_group
    condition: 'ports contains [3306] and source = 0.0.0.0/0'
    severity: critical
    description: Security group allows MySQL access from any IP address

  - id: sg-redis-open-internet
    name: Redis Port Open to Internet
    resource: security_group
    condition: 'ports contains [6379] and source = 0.0.0.0/0'
    severity: critical
    description: Security group allows Redis access from any IP address

  - id: sg-mongodb-open-internet
    name: MongoDB Port Open to Internet
    resource: security_group
    condition: 'ports contains [27017] and source = 0.0.0.0/0'
    severity: critical
    description: Security group allows MongoDB access from any IP address

  - id: sg-elasticsearch-open-internet
    name: Elasticsearch Port Open to Internet
    resource: security_group
    condition: 'ports contains [9200] and source = 0.0.0.0/0'
    severity: critical
    description: Security group allows Elasticsearch access from any IP address

  - id: oss-public-read
    name: OSS Bucket Public Read
    resource: oss_bucket
    condition: 'permission = public-read'
    severity: high
    description: OSS bucket allows public read access

  - id: oss-public-write
    name: OSS Bucket Public Write
    resource: oss_bucket
    condition: 'permission = public-read-write'
    severity: critical
    description: OSS bucket allows public read and write access
